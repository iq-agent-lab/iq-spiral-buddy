<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>Spiral Buddy — 초기 설정</title>
    <style>
      :root {
        --bg: #0e0e11;
        --bg-elev: #15151a;
        --bg-elev-2: #1d1d24;
        --border: #2a2a30;
        --border-soft: #20202a;
        --text: #e5e5ea;
        --text-dim: #aaa;
        --text-faint: #777;
        --accent: #7ee2ff;
        --danger: #ff7a7a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px 28px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        line-height: 1.5;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 4px;
        color: var(--accent);
        font-weight: 600;
      }
      .lead {
        color: var(--text-dim);
        margin-bottom: 22px;
        font-size: 12px;
      }
      .field {
        margin-bottom: 18px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: var(--text);
      }
      .hint {
        font-size: 11px;
        color: var(--text-faint);
        margin-top: 4px;
      }
      .hint a {
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 8px 10px;
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        outline: none;
      }
      input:focus { border-color: var(--accent); }
      .input-row {
        display: flex;
        gap: 8px;
      }
      .input-row input { flex: 1; }
      .pick-btn {
        background: var(--bg-elev-2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
      }
      .pick-btn:hover { background: var(--border); }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px solid var(--border-soft);
      }
      .primary {
        background: var(--accent);
        color: #0e0e11;
        border: 0;
        padding: 9px 18px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      .primary:disabled { opacity: 0.5; cursor: not-allowed; }
      .error {
        color: var(--danger);
        font-size: 12px;
        margin-top: 8px;
        min-height: 1em;
      }
      .optional-badge {
        font-size: 10px;
        color: var(--text-faint);
        font-weight: 400;
        margin-left: 6px;
      }
    </style>
  </head>
  <body>
    <h1>🌀 Spiral Buddy</h1>
    <p class="lead">
      처음 사용 시 한 번만 설정하면 됩니다. 이 정보는 사용자 디렉토리에 저장되며 외부로 전송되지 않습니다.
    </p>

    <div class="field">
      <label for="api-key">Anthropic API Key</label>
      <input id="api-key" type="password" placeholder="sk-ant-..." autocomplete="off" />
      <div class="hint">
        <a id="link-console" data-href="https://console.anthropic.com/settings/keys">console.anthropic.com</a>에서 발급
      </div>
    </div>

    <div class="field">
      <label for="vault-path">Obsidian Vault 경로</label>
      <div class="input-row">
        <input id="vault-path" type="text" placeholder="/Users/.../Obsidian Vault" />
        <button class="pick-btn" id="pick-vault" type="button">선택…</button>
      </div>
      <div class="hint">학습 노트가 저장될 위치. <code>.obsidian/</code> 디렉토리가 있는 vault 루트나 그 하위 폴더.</div>
    </div>

    <div class="field">
      <label for="roadmap-root">학습 자료 디렉토리 <span class="optional-badge">선택</span></label>
      <div class="input-row">
        <input id="roadmap-root" type="text" placeholder="/Users/.../iq-dev-lab (선택)" />
        <button class="pick-btn" id="pick-roadmap" type="button">선택…</button>
      </div>
      <div class="hint">로컬 학습 자료가 있는 폴더. 비워두면 GitHub Curated (iq-dev-lab)만 사용됩니다.</div>
    </div>

    <div class="error" id="error-msg"></div>

    <div class="actions">
      <button class="primary" id="save-btn" type="button">시작하기</button>
    </div>

    <script src="setup.js"></script>
  </body>
</html>
